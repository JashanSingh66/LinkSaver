<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Saver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="nav">
        <div class="container"  id="navContainer">
            <h1 class="navHeader">Link Saver App</h1>
            <div class="btn">
                <button id="addBtn">Save URL</button>
                <button id="loginBtn">Login</button>
            </div>
        </div>
    </nav>   
   <h3 style="text-align: center;">Saved Links: </h3>
    
    <div id="linkData">
    </div>

    <div class="panel container hidden">
        <h2 class="panelHeader">Add Link</h2>
        <form id="addLinkPanel">
                <label>Enter URL</label>
                <input type="text" name="URL" id="link" placeholder="URL"> 
                <label>Enter title of URL</label>
                <input type="text" name="title" id="title" placeholder="Title">
                <label>Enter Category of URL</label>
                <input type="text" name="category" id="category" placeholder="Category(Enter to store category)">

                <div id="addedCategories">
                    
                </div>
                <input type="submit" value="Submit" id="submitBtn">
                <input type="submit" value="Cancel" id="cancelBtn">

        </form>
    </div>
    
    <div class="login container hidden">
        <h2 class="panelHeader">Sign Up</h2>
        <form id="addLinkPanel">
            <label>Username</label>
            <input type="text" name="name" placeholder="Enter your name">
            <label>Email</label>
            <input type="email" name="email" placeholder="enter your mail">
            <label>Password</label>
            <input type="password" name="pass" placeholder="Enter your password">
        </form>
    </div>
    <script src="index.js"></script>
</body>
</html>
